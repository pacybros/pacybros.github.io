<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Under Construction</title>

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: Arial, sans-serif;
}

body {
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
background: linear-gradient(135deg, #1e293b, #0f172a);
color: white;
text-align: center;
overflow: hidden;
}

.container {
padding: 40px;
max-width: 600px;
}

h1 {
font-size: 4rem;
margin-bottom: 20px;
animation: pulse 2s infinite;
}

p {
font-size: 1.2rem;
color: #cbd5e1;
margin-bottom: 30px;
}

.loader {
width: 70px;
height: 70px;
border: 6px solid rgba(255,255,255,0.2);
border-top: 6px solid #38bdf8;
border-radius: 50%;
margin: 0 auto;
animation: spin 1s linear infinite;
}

@keyframes spin {
100% {
transform: rotate(360deg);
}
}

@keyframes pulse {
0%, 100% {
transform: scale(1);
}
50% {
transform: scale(1.05);
}
}

.footer {
margin-top: 40px;
font-size: 0.9rem;
color: #94a3b8;
}
</style>
</head>

<body>
<div class="container">
<h1>🚧 Under Construction</h1>

<p>
Our website is currently being built.<br />
We’ll be launching soon.
</p>

<div class="loader"></div>

<div class="footer">
© 2026 Your Company Name
</div>
</div>
</body>
</html>
