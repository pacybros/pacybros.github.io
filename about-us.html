:root{

*{margin:0;padding:0;box-sizing:border-box;}
body{

background:var(--light);

.container{width:90%;max-width:var(--max);margin:auto;}

/* HEADER */
header{
position:sticky;
top:0;
background:rgba(15,32,39,0.95);

}
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 0;
position:relative;
flex-wrap:wrap;
}
nav .logo{
color:white;
font-weight:800;
font-size:1.6rem;
}
nav ul.menu{
display:flex;
gap:20px;
list-style:none;
flex-wrap:wrap;
}
nav ul.menu li a{
color:white;
text-decoration:none;
font-weight:600;
padding:8px 12px;
transition:0.3s;
}
nav ul.menu li a:hover{color:var(--accent);}
.menu-toggle{
display:none;
font-size:1.8rem;
color:white;
cursor:pointer;
}

/* FOOTER */
footer{
background:var(--dark);
color:white;
text-align:center;
padding:40px 0;
position:relative;
min-height:160px;
overflow:hidden;
}

/* Footer Images */
.footer-left{
position:absolute;
bottom:10px;
left:10px;
}
.footer-right{
position:absolute;
bottom:10px;
right:10px;
}
.footer-left img,
.footer-right img{
max-width:120px;
height:auto;
display:block;
}

@media(max-width:768px){
.footer-left img,
.footer-right img{
max-width:70px;
}
.footer-left{left:5px;bottom:5px;}
.footer-right{right:5px;bottom:5px;}
}
