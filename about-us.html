<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Black & White Animated Menu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{
width:100%;
height:100%;
background:#000;
font-family:Arial,sans-serif;
overflow-x:hidden;
}

/* GRID */

.menu{
width:100%;
min-height:100vh;

display:grid;

grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);

gap:2px;

background:#fff;
}

/* CARDS */

.card{
background:#000;
color:#fff;

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

text-align:center;

min-height:33.33vh;

padding:40px;

opacity:0;

animation-name:show;
animation-duration:1s;
animation-fill-mode:forwards;
animation-timing-function:cubic-bezier(.22,1,.36,1);

will-change:transform, opacity;

backface-visibility:hidden;
-webkit-backface-visibility:hidden;
}

/* TITLES */

.card h2{
font-size:clamp(28px,3vw,54px);
text-transform:uppercase;
letter-spacing:3px;
margin-bottom:12px;
}

/* TEXT */

.card p{
font-size:clamp(14px,1.2vw,18px);
opacity:0.7;
letter-spacing:1px;
}

/* ANIMATION */

@keyframes show{

0%{
opacity:0;
}

100%{
opacity:1;
transform:translate3d(0,0,0) scale(1);
}
}

/* ENTRY DIRECTIONS */

.top{
transform:translate3d(0,-140px,0);
}

.bottom{
transform:translate3d(0,140px,0);
}

.left{
transform:translate3d(-140px,0,0);
}

.right{
transform:translate3d(140px,0,0);
}

.tl{
transform:translate3d(-140px,-140px,0);
}

.tr{
transform:translate3d(140px,-140px,0);
}

.bl{
transform:translate3d(-140px,140px,0);
}

.br{
transform:translate3d(140px,140px,0);
}

.center{
transform:scale(0.2);
}

/* STAGGER DELAYS */

.card:nth-child(1){
animation-delay:.1s;
}

.card:nth-child(2){
animation-delay:.2s;
}

.card:nth-child(3){
animation-delay:.3s;
}

.card:nth-child(4){
animation-delay:.4s;
}

.card:nth-child(5){
animation-delay:.5s;
}

.card:nth-child(6){
animation-delay:.6s;
}

.card:nth-child(7){
animation-delay:.7s;
}

.card:nth-child(8){
animation-delay:.8s;
}

.card:nth-child(9){
animation-delay:.9s;
}

/* HOVER */

.card:hover{
background:#fff;
color:#000;
transition:.35s ease;
}

/* MOBILE */

@media (max-width:768px){

.menu{
grid-template-columns:1fr;
grid-template-rows:auto;
}

.card{
min-height:100svh;
}
}

</style>
</head>

<body>

<div class="menu">

<div class="card top">
<h2>template</h2>
<p>?????</p>
</div>

<div class="card bottom">
<h2>template</h2>
<p>?????</p>
</div>

<div class="card left">
<h2>template</h2>
<p>?????</p>
</div>

<div class="card right">
<h2>template</h2>
<p>?????</p>
</div>

<div class="card tl">
<h2>template</h2>
<p>?????</p>
</div>

<div class="card tr">
<h2>template</h2>
<p>?????</p>
</div>

<div class="card bl">
<h2>template</h2>
<p>?????</p>
</div>

<div class="card br">
<h2>template</h2>
<p>?????</p>
</div>

<div class="card center">
<h2>template</h2>
<p>?????</p>
</div>

</div>

</body>
</html>
