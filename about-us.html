<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Responsive Black & White Menu</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:Arial,sans-serif;
min-height:100vh;
overflow-x:hidden;
}

/* FULL SCREEN LAYOUT */
.menu{
width:100%;
min-height:100vh;

display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);

gap:2px;

background:#fff;
}

/* CARD STYLE */
.card{
background:#000;
color:#fff;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

min-height:33vh;
padding:40px;

text-align:center;

opacity:0;
animation:show 1s forwards;
}

/* TITLES */
.card h2{
font-size:clamp(28px,3vw,48px);
text-transform:uppercase;
margin-bottom:12px;
letter-spacing:2px;
}

/* TEXT */
.card p{
font-size:clamp(14px,1.2vw,18px);
opacity:0.7;
}

/* ANIMATION */
@keyframes show{
to{
opacity:1;
transform:translate(0,0) scale(1);
}
}

/* ENTRY DIRECTIONS */
.top{
transform:translateY(-120px);
}

.bottom{
transform:translateY(120px);
}

.left{
transform:translateX(-120px);
}

.right{
transform:translateX(120px);
}

.tl{
transform:translate(-120px,-120px);
}

.tr{
transform:translate(120px,-120px);
}

.bl{
transform:translate(-120px,120px);
}

.br{
transform:translate(120px,120px);
}

.center{
transform:scale(0.2);
}

/* STAGGER */
.card:nth-child(1){ animation-delay:.1s; }
.card:nth-child(2){ animation-delay:.2s; }
.card:nth-child(3){ animation-delay:.3s; }
.card:nth-child(4){ animation-delay:.4s; }
.card:nth-child(5){ animation-delay:.5s; }
.card:nth-child(6){ animation-delay:.6s; }
.card:nth-child(7){ animation-delay:.7s; }
.card:nth-child(8){ animation-delay:.8s; }
.card:nth-child(9){ animation-delay:.9s; }

/* MOBILE STACK */
@media (max-width: 768px){

.menu{
grid-template-columns:1fr;
grid-template-rows:auto;
}

.card{
min-height:100vh;
}
}
</style>
</head>

<body>

</div>

</html>
