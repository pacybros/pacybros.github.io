<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Black & White Menu</title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: black;
color: white;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
}

.menu {
display: grid;
grid-template-columns: repeat(3, 200px);
gap: 20px;
}

.card {
background: white;
color: black;
padding: 20px;
border: 2px solid white;
opacity: 0;
transform: translate(0,0);
animation: fadeIn 1s forwards;
}

.card h2 {
margin: 0 0 10px 0;
font-size: 18px;
text-transform: uppercase;
}

.card p {
margin: 0;
font-size: 14px;
}

/* Base fade */
@keyframes fadeIn {
to {
opacity: 1;
transform: translate(0,0);
}
}

/* Individual directions */
.top { transform: translateY(-100px); }
.bottom { transform: translateY(100px); }
.left { transform: translateX(-100px); }
.right { transform: translateX(100px); }
.tl { transform: translate(-100px, -100px); }
.tr { transform: translate(100px, -100px); }
.bl { transform: translate(-100px, 100px); }
.br { transform: translate(100px, 100px); }
.center { transform: scale(0.5); }

/* Stagger animation delays */
.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.3s; }
.card:nth-child(4) { animation-delay: 0.4s; }
.card:nth-child(5) { animation-delay: 0.5s; }
.card:nth-child(6) { animation-delay: 0.6s; }
.card:nth-child(7) { animation-delay: 0.7s; }
.card:nth-child(8) { animation-delay: 0.8s; }
.card:nth-child(9) { animation-delay: 0.9s; }

</style>
</head>

<body>

<div class="menu">
<div class="card top">
<h2>template</h2><p>?????</p>
</div>

<div class="card bottom">
<h2>template</h2><p>?????</p>
</div>

<div class="card left">
<h2>template</h2><p>?????</p>
</div>

<div class="card right">
<h2>template</h2><p>?????</p>
</div>

<div class="card tl">
<h2>template</h2><p>?????</p>
</div>

<div class="card tr">
<h2>template</h2><p>?????</p>
</div>

<div class="card bl">
<h2>template</h2><p>?????</p>
</div>

<div class="card br">
<h2>template</h2><p>?????</p>
</div>

<div class="card center">
<h2>template</h2><p>?????</p>
</div>
</div>

</body>
</html>
