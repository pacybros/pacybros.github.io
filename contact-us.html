<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sky-Vac Gutter Cleanup</title>
<style>
body {
margin: 0;
background: #1b1f2a;
color: white;
font-family: Arial, sans-serif;
text-align: center;
}
canvas {
background: linear-gradient(#87ceeb 60%, #556b2f 60%);
display: block;
margin: 0 auto;
border: 2px solid #333;
}
#hud {
margin: 10px;
}
</style>
</head>
<body>

<h2>Sky-Vac: Gutter Cleanup</h2>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;
const scoreEl = document.getElementById("score");

const vac = {
x: 400,
y: 120,
w: 40,
h: 20,
speed: 6,
sucking: false
};

const debris = [];
const gutterY = 300;

function spawnDebris() {
debris.push({
x: Math.random() * canvas.width,
y: gutterY + Math.random() * 80,
r: 6 + Math.random() * 6,
stuck: true
});
}

for (let i = 0; i < 12; i++) spawnDebris();

setInterval(() => {
if (debris.length < 20) spawnDebris();
}, 1500);

document.addEventListener("keydown", (e) => {
if (e.key === "ArrowLeft") vac.x -= vac.speed;
if (e.key === "ArrowRight") vac.x += vac.speed;
if (e.key === " ") vac.sucking = true;
});

document.addEventListener("keyup", (e) => {
if (e.key === " ") vac.sucking = false;
});

function update() {
vac.x = Math.max(0, Math.min(canvas.width, vac.x));

debris.forEach(d => {
if (vac.sucking) {
const dx = vac.x - d.x;
const dy = vac.y - d.y;
const dist = Math.sqrt(dx*dx + dy*dy);

if (dist < 140) {
d.y -= 4;
d.x += dx * 0.02;

if (d.y < vac.y + 10) {
d.stuck = false;
d.collected = true;
}
}
}
});

for (let i = debris.length - 1; i >= 0; i--) {
if (debris[i].collected) {
debris.splice(i, 1);
score += 1;
scoreEl.textContent = score;
}
}
}

function drawVac() {
ctx.fillStyle = "#00ffcc";
ctx.fillRect(vac.x - vac.w/2, vac.y, vac.w, vac.h);

if (vac.sucking) {
ctx.strokeStyle = "rgba(0,255,255,0.4)";
ctx.beginPath();
ctx.moveTo(vac.x, vac.y + vac.h);
ctx.lineTo(vac.x, canvas.height);
ctx.stroke();
}
}

function drawDebris() {
debris.forEach(d => {
ctx.fillStyle = "#444";
ctx.beginPath();
ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
ctx.fill();
});
}

function drawGutter() {
ctx.fillStyle = "#2f2f2f";
ctx.fillRect(0, gutterY, canvas.width, 10);
ctx.fillStyle = "#3a3a3a";
ctx.fillRect(0, gutterY + 10, canvas.width, 90);
}

function loop() {
ctx.clearRect(0, 0, canvas.width, canvas.height);

drawGutter();
update();
drawDebris();
drawVac();

requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
